services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qrm_orchestration
      POSTGRES_USER: qrm_app
      POSTGRES_PASSWORD: qrm_app_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrm_app -d qrm_orchestration"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - qrm_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
    environment:
      QRM_APP_NAME: "Pharma AI Risk Orchestration Backend"
      QRM_APP_VERSION: "0.1.0"
      QRM_ENVIRONMENT: "local"
      QRM_DATABASE_URL: "postgresql+psycopg://qrm_app:qrm_app_dev@postgres:5432/qrm_orchestration"
      QRM_REDIS_URL: "redis://redis:6379/0"
      QRM_LOCAL_STORAGE_ROOT: "/data/documents"
      QRM_PARSING_QUALITY_THRESHOLD: "0.65"
      QRM_AUDIT_LOG_ENABLED: "true"
      QRM_ALLOW_MODEL_LIVE_INTERNET: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - qrm_app_documents:/data/documents

volumes:
  qrm_postgres_data:
  qrm_app_documents:
